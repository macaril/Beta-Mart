<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beta Mart Warehouse</title>
  <style>
    body {
      align-items: center;
      background: #f6f7fb;
      color: #172033;
      display: flex;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
    }
    main {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 14px 34px rgba(15, 23, 42, .07);
      max-width: 620px;
      padding: 32px;
    }
    h1 { margin: 0 0 10px; }
    p { color: #687386; line-height: 1.7; }
    code {
      background: #eff6ff;
      border-radius: 8px;
      color: #1d4ed8;
      display: inline-block;
      font-weight: 700;
      padding: 4px 8px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Beta Mart Warehouse</h1>
    <p>Project ini sudah dipindahkan menjadi aplikasi Laravel dengan database. Jalankan lewat terminal:</p>
    <p><code>composer install</code> lalu <code>php artisan migrate:fresh --seed</code> dan <code>php artisan serve</code>.</p>
    <p>Setelah server aktif, buka <code>http://127.0.0.1:8000</code>.</p>
  </main>
</body>
</html>
